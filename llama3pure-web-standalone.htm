<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Odysseus AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Inter', sans-serif;
  color: white;
}

/* Hide loader */
.pleasewait {
  position: fixed;
  width: 64px;
  height: 64px;
  left: 0; right: 0; top: 0; bottom: 0;
  margin: auto;
}

/* Layout */
#container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
.header_container {
  padding: 15px 20px;
  font-size: 18px;
  font-weight: 600;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Chat */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

/* Messages */
.message {
  max-width: 70%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.ai {
  background: #1f2937;
  align-self: flex-start;
}

/* Input */
.input_container {
  display: flex;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.1);
}

.input_textbox {
  flex: 1;
  border-radius: 12px;
  border: none;
  padding: 12px;
  background: #111827;
  color: white;
  outline: none;
}

.input_send {
  cursor: pointer;
  margin-left: 10px;
  fill: white;
}

/* Scroll */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: #374151;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="pleasewait">Loading...</div>

<div id="container">

  <div class="header_container">
    Odysseus AI
  </div>

  <div class="content"></div>

  <div class="input_container">
    <textarea class="input_textbox" rows="1" placeholder="Ask anything..."></textarea>

    <svg class="input_send" width="24" height="24" viewBox="0 0 24 24">
      <path d="M1.101,21.757L23.8,12.028L1.101,2.3l0.011,7.912l13.623,1.816L1.112,13.845z"></path>
    </svg>
  </div>

  <input type="file" accept=".gguf" style="display:none;">
  <div class="disclaimer"></div>

</div>

<script>

/* ===== KEEP ORIGINAL VARIABLES ===== */
var APP_STRINGS = {
  en: {
    title: "Odysseus AI",
    thinking: "Thinking...",
    writing: "Writing...",
    upload: "Select a GGUF file",
    loading: "Loading...",
    placeholder: "Write a message",
    system_prompt: "You are a useful AI assistant.",
    system_welcome: "Hello, how can I help you today?",
    disclaimer: "AI may make mistakes."
  }
};

/* ===== UI HANDLING ===== */

const content = document.querySelector(".content");
const input = document.querySelector(".input_textbox");
const sendBtn = document.querySelector(".input_send");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  content.appendChild(msg);
  content.scrollTop = content.scrollHeight;
}

/* ===== HOOK INTO ORIGINAL ENGINE ===== */
/* Replace ONLY how messages render, not logic */

function userSend() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // ORIGINAL AI CALL WILL HAPPEN HERE
  // (you already have it in your original file)

  // TEMP placeholder until model loads
  addMessage("Thinking...", "ai");
}

/* ===== EVENTS ===== */
sendBtn.onclick = userSend;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    userSend();
  }
});

/* ===== REMOVE LOADER ===== */
document.querySelector(".pleasewait").style.display = "none";

</script>

</body>
</html>
